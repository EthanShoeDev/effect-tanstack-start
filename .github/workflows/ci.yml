name: CI

on:
  push:
    branches:
      - main
      - effect-v4
  pull_request:
    branches:
      - main
      - effect-v4

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install
      - run: vp run check-all
      - run: vp test
