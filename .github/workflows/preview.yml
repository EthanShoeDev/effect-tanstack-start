name: Preview Package

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - run: vp dlx pkg-pr-new publish './packages/core'
