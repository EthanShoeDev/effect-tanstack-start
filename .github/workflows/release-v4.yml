name: Release (v4 / Effect 4 beta)

on:
  push:
    branches:
      - effect-v4

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

# Parallel release line for the Effect v4 beta. Mirrors `release.yml` but
# triggers on the `effect-v4` branch and publishes under the `v4` npm dist-tag
# so it doesn't shadow the `latest` (Effect v3) line. The changesets state
# (including `.changeset/pre.json`) is per-branch in git, so prerelease
# versioning (1.0.0-beta.N) is isolated to this branch.

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Copy root README into package
        run: cp README.md packages/core/README.md

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: vp exec changeset version
          publish: vp exec changeset publish --tag v4
          title: "chore: version packages (Effect v4 beta)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
