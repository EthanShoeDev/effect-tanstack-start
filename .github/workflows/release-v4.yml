name: Release (v4 / Effect 4 beta)

on:
  push:
    branches:
      - effect-v4

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

# Parallel release line for the Effect v4 beta. Mirrors `release.yml` but
# triggers on the `effect-v4` branch. While `.changeset/pre.json` is present
# (pre mode, tag = "beta"), `changeset publish` automatically tags releases
# with the pre-mode tag (`beta`), so we don't pass `--tag` ourselves — doing
# so errors with "Releasing under custom tag is not allowed in pre mode".
#
# Net effect: 1.0.0-beta.N versions land under the `beta` npm dist-tag.
# `npm install effect-tanstack-start` keeps installing 0.x (the `latest`
# Effect v3 line); opt in to v4 with `npm install effect-tanstack-start@beta`.

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Copy root README into package
        run: cp README.md packages/core/README.md

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: vp exec changeset version
          publish: vp exec changeset publish
          title: "chore: version packages (Effect v4 beta)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
