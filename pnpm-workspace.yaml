packages:
  - apps/*
  - packages/*
allowBuilds:
  esbuild: true

catalog:
  "@effect/platform": ^0.95.0
  "@effect/platform-node": ^0.105.0
  "@effect/platform-node-shared": ^0.58.0
  "@effect/language-service": ^0.75.1
  "@effect/vitest": ^0.28.0
  "@tanstack/react-router": ^1.167.4
  "@tanstack/react-start": ^1.166.16
  "@types/node": ^24
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.0.3
  "@vitejs/plugin-react": ^6.0.1
  effect: ^3.20.0
  nitro: ^3.0.260311-beta
  react: ^19.0.0
  react-dom: ^19.0.0
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
